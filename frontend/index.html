<!DOCTYPE html>
<html>
<head>
    <title>Multi-Tier App</title>
</head>

<body>

    <h1>Frontend Server</h1>

    <button onclick="callBackend()">
        Call Backend
    </button>

    <p id="result"></p>

    <script>
        function callBackend() {

            fetch("http://15.206.68.19:3000")

                .then(response => response.text())

                .then(data => {
                    document.getElementById("result").innerText = data;
                });

        }
    </script>

</body>
</html>
